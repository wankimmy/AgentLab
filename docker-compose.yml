services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentlab}
      POSTGRES_DB: ${POSTGRES_DB:-agentlab}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentlab}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflowdata:/mlflow

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agentlab:agentlab@postgres:5432/agentlab
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
      target: dev
    env_file:
      - .env
    environment:
      NUXT_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
      target: dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agentlab:agentlab@postgres:5432/agentlab
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ./apps/api:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  mlflowdata:
